name: Build Android APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_DIR: artifacts/fb-guard
      APP_ID: com.fbguard.app
      APP_NAME: Facebook Guard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        working-directory: ${{ env.APP_DIR }}
        env:
          NODE_ENV: production
          BASE_PATH: "/"
        run: pnpm run build

      - name: Install Capacitor packages
        working-directory: ${{ env.APP_DIR }}
        run: |
          pnpm add -D @capacitor/cli@^6 -w=false || npm i -D @capacitor/cli@^6
          npm i @capacitor/core@^6 @capacitor/android@^6

      - name: Add Android platform
        working-directory: ${{ env.APP_DIR }}
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Make gradlew executable
        working-directory: ${{ env.APP_DIR }}/android
        run: chmod +x ./gradlew

      - name: Build debug APK with Gradle
        working-directory: ${{ env.APP_DIR }}/android
        run: ./gradlew --no-daemon assembleDebug

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find ${{ env.APP_DIR }}/android/app/build/outputs/apk -name "*.apk" | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          NEW_NAME="fb-guard-${{ github.run_number }}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "apk_path=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_size=$(du -h "$NEW_NAME" | cut -f1)" >> "$GITHUB_OUTPUT"
          ls -lh "$NEW_NAME"

      - name: Smoke test APK
        run: |
          APK="${{ steps.apk.outputs.apk_path }}"
          echo "Verifying APK structure..."
          unzip -l "$APK" | head -n 30
          unzip -l "$APK" | grep -q "AndroidManifest.xml" || { echo "Missing AndroidManifest.xml"; exit 1; }
          unzip -l "$APK" | grep -q "classes.dex" || { echo "Missing classes.dex"; exit 1; }
          unzip -l "$APK" | grep -q "assets/public/index.html" || { echo "Missing web assets"; exit 1; }
          echo "APK smoke test passed."

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fb-guard-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Create / update GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Facebook Guard build #${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}
            
            - APK: ${{ steps.apk.outputs.apk_path }}
            - Size: ${{ steps.apk.outputs.apk_size }}
            - Branch: ${{ github.ref_name }}
            
            Download the APK from the assets below.
          files: ${{ steps.apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print download URL
        if: github.event_name == 'push'
        run: |
          echo "::notice title=APK Ready::Download at https://github.com/${{ github.repository }}/releases/tag/build-${{ github.run_number }}"
          echo ""
          echo "============================================"
          echo "  APK DOWNLOAD URL"
          echo "============================================"
          echo "https://github.com/${{ github.repository }}/releases/download/build-${{ github.run_number }}/${{ steps.apk.outputs.apk_path }}"
          echo "============================================"
